<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Pro | SOS PNEUS DOMICILE 65</title>
    <meta name="description" content="Dashboard pro SOS PNEUS DOMICILE 65 : nouvelle demande d’intervention et suivi de vos demandes." />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="pro-page">
    <main class="pro-shell">
      <header class="pro-top">
        <a href="index.html" class="brand" aria-label="Retour au site public">
          <svg viewBox="0 0 64 64" class="brand-mark" aria-hidden="true">
            <circle cx="32" cy="32" r="25" fill="none" stroke="currentColor" stroke-width="4" />
            <circle cx="32" cy="32" r="10" fill="none" stroke="currentColor" stroke-width="4" />
            <path d="M32 4v10M32 50v10M4 32h10M50 32h10M11 11l7 7M46 46l7 7" stroke="currentColor" stroke-width="3" />
          </svg>
          <span>SOS PNEUS DOMICILE <strong>65</strong></span>
        </a>
        <button id="logout-btn" class="btn btn-call" type="button">Déconnexion</button>
      </header>

      <section class="pro-intro">
        <p class="kicker">Dashboard Pro</p>
        <h1 id="welcome-title">Bienvenue</h1>
        <p>Nouvelle demande d’intervention et suivi de vos dossiers en temps réel.</p>
      </section>

      <section class="pro-card" aria-label="Nouvelle demande">
        <h2>Nouvelle demande d’intervention</h2>
        <form id="request-form" class="request-grid" novalidate>
          <label>Nom entreprise
            <input name="companyName" required />
          </label>
          <label>Nom du contact
            <input name="contactName" required />
          </label>
          <label>Téléphone
            <input name="phone" type="tel" required />
          </label>
          <label>Email
            <input name="email" type="email" required />
          </label>
          <label>Type de véhicule
            <input name="vehicleType" required />
          </label>
          <label>Immatriculation
            <input name="plateNumber" required />
          </label>
          <label>Localisation
            <input name="location" required />
          </label>
          <label>Type de besoin
            <input name="serviceType" required />
          </label>
          <label>Niveau d’urgence
            <select name="urgency" required>
              <option value="">Choisir…</option>
              <option>Faible</option>
              <option>Moyenne</option>
              <option>Élevée</option>
              <option>Urgence immédiate</option>
            </select>
          </label>
          <label>Créneau souhaité
            <input name="preferredSlot" placeholder="Ex : Aujourd’hui 14h-16h" required />
          </label>
          <label class="full">Commentaire
            <textarea name="notes" rows="4" placeholder="Précisions utiles..."></textarea>
          </label>
          <div class="full">
            <button type="submit" class="btn btn-wa">Envoyer la demande</button>
          </div>
        </form>
        <p id="request-message" class="pro-message" role="status" aria-live="polite"></p>
      </section>

      <section class="pro-card" aria-label="Mes demandes">
        <h2>Mes demandes</h2>
        <div id="requests-list" class="requests-list">
          <p class="muted">Chargement des demandes...</p>
        </div>
      </section>
    </main>

    <script type="module" src="dashboard.js"></script>
  </body>
</html>
